<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeetingAgent · Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ["'JetBrains Mono'", "Fira Code", "monospace"] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    body { background: #09090b; color: #f4f4f5; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    details summary::-webkit-details-marker { display: none; }
  </style>
</head>
<body class="min-h-screen" x-data="app()" x-init="init()" x-cloak>

  <!-- ── HEADER ── -->
  <header class="border-b border-zinc-800 bg-zinc-900/70 backdrop-blur-sm sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 h-13 flex items-center justify-between py-3">
      <div class="flex items-center gap-2.5">
        <span class="text-violet-400 font-bold text-lg font-mono">▶</span>
        <span class="font-semibold text-zinc-100 text-sm">MeetingAgent</span>
        <span class="text-zinc-700 text-xs font-mono">v0.4.2</span>
      </div>
      <div class="flex items-center gap-2 text-xs font-mono">
        <span :class="apiOk ? 'bg-emerald-400' : 'bg-red-500'" class="w-1.5 h-1.5 rounded-full"></span>
        <span :class="apiOk ? 'text-emerald-400' : 'text-red-400'" x-text="apiOk ? 'API conectada' : 'Sin conexión'"></span>
      </div>
    </div>
  </header>

  <!-- ── MAIN ── -->
  <main class="max-w-4xl mx-auto px-4 py-8">

    <!-- Tabs -->
    <div class="flex gap-1 border-b border-zinc-800 mb-8">
      <button @click="tab = 'upload'"
        :class="tab === 'upload' ? 'text-violet-300 border-b border-violet-400 bg-violet-950/20' : 'text-zinc-500 hover:text-zinc-300'"
        class="px-4 py-2.5 text-sm font-medium transition-colors -mb-px">
        Subir audio
      </button>
      <button @click="tab = 'meetings'; loadMeetings()"
        :class="tab === 'meetings' ? 'text-violet-300 border-b border-violet-400 bg-violet-950/20' : 'text-zinc-500 hover:text-zinc-300'"
        class="px-4 py-2.5 text-sm font-medium transition-colors -mb-px">
        Reuniones
        <span x-show="meetings.length > 0" class="ml-1.5 text-xs bg-zinc-800 text-zinc-400 px-1.5 py-0.5 rounded-full font-mono" x-text="meetings.length"></span>
      </button>
      <button @click="tab = 'search'"
        :class="tab === 'search' ? 'text-violet-300 border-b border-violet-400 bg-violet-950/20' : 'text-zinc-500 hover:text-zinc-300'"
        class="px-4 py-2.5 text-sm font-medium transition-colors -mb-px">
        Búsqueda semántica
      </button>
    </div>

    <!-- ─────────────────────────────────────────────
         TAB: UPLOAD
    ───────────────────────────────────────────── -->
    <div x-show="tab === 'upload'" x-transition:enter="transition ease-out duration-150"
      x-transition:enter-start="opacity-0 translate-y-1" x-transition:enter-end="opacity-100 translate-y-0">
      <div class="max-w-xl mx-auto space-y-4">

        <!-- Drop zone -->
        <div
          @dragover.prevent="dragging = true"
          @dragleave.self="dragging = false"
          @drop.prevent="onDrop($event)"
          :class="dragging ? 'border-violet-500 bg-violet-950/20' : uploadFile ? 'border-emerald-500/40 bg-emerald-950/10' : 'border-zinc-700 hover:border-zinc-600 bg-zinc-900/30'"
          class="rounded-xl border-2 border-dashed p-10 text-center cursor-pointer transition-all"
          @click="$refs.fileInput.click()">
          <input type="file" x-ref="fileInput" class="hidden"
            accept=".mp3,.mp4,.wav,.m4a,.ogg,.flac,.webm" @change="onFileSelect($event)">

          <template x-if="!uploadFile">
            <div>
              <div class="text-4xl mb-3 select-none">🎙️</div>
              <p class="text-zinc-300 text-sm font-medium">Arrastra tu audio aquí o haz clic</p>
              <p class="text-zinc-600 text-xs mt-1.5 font-mono">mp3 · wav · m4a · ogg · flac · webm · max 500MB</p>
            </div>
          </template>

          <template x-if="uploadFile">
            <div class="flex items-center justify-center gap-3">
              <span class="text-emerald-400 text-2xl">✓</span>
              <div class="text-left min-w-0">
                <p class="text-zinc-200 text-sm font-mono font-medium truncate" x-text="uploadFile.name"></p>
                <p class="text-zinc-500 text-xs font-mono" x-text="(uploadFile.size / 1024 / 1024).toFixed(1) + ' MB'"></p>
              </div>
              <button @click.stop="uploadFile = null; job = null; $refs.fileInput.value = ''"
                class="ml-3 text-zinc-600 hover:text-zinc-300 text-sm transition-colors">✕</button>
            </div>
          </template>
        </div>

        <!-- Metadata -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-zinc-500 font-mono uppercase tracking-wider mb-1.5">Título</label>
            <input x-model="uploadTitle" type="text" placeholder="Standup 27 mar…"
              class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-violet-500 transition-colors">
          </div>
          <div>
            <label class="block text-xs text-zinc-500 font-mono uppercase tracking-wider mb-1.5">Fecha</label>
            <input x-model="uploadDate" type="date"
              class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-200 focus:outline-none focus:border-violet-500 transition-colors">
          </div>
        </div>

        <!-- Submit -->
        <button @click="uploadAudio()"
          :disabled="!uploadFile || uploading"
          :class="!uploadFile || uploading ? 'opacity-40 cursor-not-allowed' : 'hover:bg-violet-600 cursor-pointer'"
          class="w-full bg-violet-500 text-white font-semibold py-2.5 px-4 rounded-lg text-sm transition-colors flex items-center justify-center gap-2">
          <template x-if="!uploading"><span>▶ Analizar reunión</span></template>
          <template x-if="uploading">
            <span class="flex items-center gap-2">
              <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="40" stroke-dashoffset="15"/>
              </svg>
              Procesando…
            </span>
          </template>
        </button>

        <!-- Job status card -->
        <div x-show="job" x-transition class="rounded-xl border border-zinc-800 bg-zinc-900/50 overflow-hidden">

          <!-- Status bar -->
          <div class="flex items-center gap-2 px-4 py-3 border-b border-zinc-800 bg-zinc-900/80">
            <template x-if="job?.status === 'processing'">
              <span class="flex items-center gap-2 text-violet-400 text-xs font-mono">
                <svg class="animate-spin h-3 w-3" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="40" stroke-dashoffset="15"/>
                </svg>
                Procesando pipeline LangGraph…
              </span>
            </template>
            <template x-if="job?.status === 'done'">
              <span class="text-emerald-400 text-xs font-mono">✓ Pipeline completado</span>
            </template>
            <template x-if="job?.status === 'error'">
              <span class="text-red-400 text-xs font-mono">✗ Error en el pipeline</span>
            </template>
            <span class="ml-auto text-zinc-700 text-xs font-mono" x-text="'job:' + (job?.job_id ?? '').slice(0,8)"></span>
          </div>

          <!-- Error detail -->
          <div x-show="job?.status === 'error'" class="p-4">
            <p class="text-red-400 text-sm font-mono leading-relaxed" x-text="job?.error"></p>
          </div>

          <!-- Processing hint -->
          <div x-show="job?.status === 'processing'" class="p-4">
            <div class="space-y-1.5">
              <template x-for="(step, i) in pipelineSteps">
                <div class="flex items-center gap-2 text-xs font-mono"
                  :class="i <= pipelineHint ? 'text-violet-300' : 'text-zinc-700'">
                  <span x-text="i <= pipelineHint ? '▶' : '○'"></span>
                  <span x-text="step"></span>
                </div>
              </template>
            </div>
          </div>

          <!-- Result -->
          <div x-show="job?.status === 'done'" class="p-4 space-y-4">

            <div x-show="job?.summary">
              <p class="text-xs text-zinc-500 font-mono uppercase tracking-wider mb-2">Resumen</p>
              <p class="text-sm text-zinc-300 leading-relaxed" x-text="job?.summary"></p>
            </div>

            <div x-show="job?.decisions?.length">
              <p class="text-xs text-zinc-500 font-mono uppercase tracking-wider mb-2">Decisiones</p>
              <ul class="space-y-1">
                <template x-for="d in job?.decisions ?? []">
                  <li class="text-sm text-zinc-400 flex gap-2">
                    <span class="text-violet-400 shrink-0">—</span>
                    <span x-text="d"></span>
                  </li>
                </template>
              </ul>
            </div>

            <div x-show="job?.action_items?.length">
              <p class="text-xs text-zinc-500 font-mono uppercase tracking-wider mb-2">Action Items</p>
              <ul class="space-y-1.5">
                <template x-for="item in job?.action_items ?? []">
                  <li class="flex items-start gap-2 text-sm">
                    <span class="w-3.5 h-3.5 border border-zinc-600 rounded mt-0.5 shrink-0 inline-block"></span>
                    <span>
                      <span class="text-zinc-200" x-text="item.task"></span>
                      <span class="text-zinc-500 font-mono text-xs ml-1.5"
                        x-text="[item.owner, item.due_date].filter(Boolean).join(' · ')"></span>
                    </span>
                  </li>
                </template>
              </ul>
            </div>

            <button @click="tab = 'meetings'; loadMeetings()"
              class="text-xs text-violet-400 hover:text-violet-300 font-mono transition-colors">
              Ver en Reuniones →
            </button>
          </div>
        </div>

      </div>
    </div>

    <!-- ─────────────────────────────────────────────
         TAB: MEETINGS
    ───────────────────────────────────────────── -->
    <div x-show="tab === 'meetings'" x-transition:enter="transition ease-out duration-150"
      x-transition:enter-start="opacity-0 translate-y-1" x-transition:enter-end="opacity-100 translate-y-0">

      <div x-show="loadingMeetings" class="flex items-center justify-center py-20 text-zinc-600 font-mono text-sm gap-2">
        <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="40" stroke-dashoffset="15"/>
        </svg>
        Cargando…
      </div>

      <div x-show="!loadingMeetings && meetings.length === 0" class="text-center py-20">
        <p class="text-4xl mb-4 select-none">📭</p>
        <p class="text-zinc-500 text-sm">Aún no hay reuniones analizadas.</p>
        <button @click="tab = 'upload'"
          class="text-violet-400 text-sm mt-3 hover:text-violet-300 transition-colors font-mono">
          Subir tu primera reunión →
        </button>
      </div>

      <div x-show="!loadingMeetings && meetings.length > 0" class="space-y-2.5">
        <template x-for="m in meetings" :key="m.id">
          <div class="rounded-xl border border-zinc-800 bg-zinc-900/40 overflow-hidden transition-colors hover:border-zinc-700">

            <!-- Meeting row -->
            <button @click="toggleMeeting(m.id)"
              class="w-full px-5 py-4 flex items-start gap-4 text-left">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap">
                  <p class="font-semibold text-zinc-100 text-sm" x-text="m.title"></p>
                </div>
                <p class="text-xs text-zinc-500 font-mono mt-0.5">
                  <span x-text="m.date"></span>
                  <span x-show="m.duration_s" x-text="' · ' + Math.round(m.duration_s / 60) + ' min'"></span>
                  <span x-show="m.speakers?.length" x-text="' · ' + m.speakers.join(', ')"></span>
                </p>
                <p x-show="m.summary" class="text-xs text-zinc-600 mt-1.5 line-clamp-2" x-text="m.summary"></p>
              </div>
              <span class="text-zinc-600 shrink-0 text-lg transition-transform duration-200 mt-0.5"
                :class="expandedMeeting?.id === m.id ? 'rotate-90' : ''">›</span>
            </button>

            <!-- Expanded -->
            <div x-show="expandedMeeting?.id === m.id"
              x-transition:enter="transition ease-out duration-150"
              x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
              class="border-t border-zinc-800">

              <div x-show="loadingDetail" class="p-5 text-xs text-zinc-600 font-mono">Cargando detalle…</div>

              <div x-show="!loadingDetail && expandedMeeting" class="p-5 space-y-5">

                <!-- Decisions -->
                <div x-show="expandedMeeting?.decisions?.length">
                  <p class="text-xs text-zinc-500 font-mono uppercase tracking-wider mb-2">Decisiones</p>
                  <ul class="space-y-1.5">
                    <template x-for="d in expandedMeeting?.decisions ?? []">
                      <li class="text-sm text-zinc-400 flex gap-2">
                        <span class="text-violet-400/70 shrink-0">—</span>
                        <span x-text="d"></span>
                      </li>
                    </template>
                  </ul>
                </div>

                <!-- Action items -->
                <div x-show="expandedMeeting?.action_items?.length">
                  <p class="text-xs text-zinc-500 font-mono uppercase tracking-wider mb-2">Action Items</p>
                  <ul class="space-y-2">
                    <template x-for="item in expandedMeeting?.action_items ?? []">
                      <li class="flex items-start gap-2.5">
                        <input type="checkbox"
                          :checked="item.status === 'done'"
                          @change="toggleTask(item)"
                          class="mt-0.5 h-3.5 w-3.5 shrink-0 accent-violet-500 cursor-pointer rounded">
                        <div class="flex-1 min-w-0">
                          <span class="text-sm"
                            :class="item.status === 'done' ? 'line-through text-zinc-600' : 'text-zinc-200'"
                            x-text="item.task"></span>
                          <span class="text-xs font-mono ml-1.5 text-zinc-500"
                            x-show="item.owner || item.due_date"
                            x-text="'— ' + [item.owner, item.due_date].filter(Boolean).join(' · ')"></span>
                        </div>
                        <span class="text-xs font-mono px-1.5 py-0.5 rounded shrink-0"
                          :class="item.status === 'done' ? 'bg-emerald-950/50 text-emerald-500' : 'bg-zinc-800 text-zinc-500'"
                          x-text="item.status"></span>
                      </li>
                    </template>
                  </ul>
                </div>

                <!-- Export bar -->
                <div class="flex flex-wrap items-center gap-2 pt-1 pb-1">
                  <span class="text-xs text-zinc-600 font-mono shrink-0">Exportar →</span>
                  <button @click="exportICS(expandedMeeting)"
                    title="Descarga .ics compatible con Google Calendar, Apple Calendar y Outlook"
                    class="flex items-center gap-1.5 text-xs font-mono text-zinc-400 hover:text-zinc-100 border border-zinc-800 hover:border-zinc-600 bg-zinc-900/60 px-2.5 py-1 rounded transition-all">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    ICS
                  </button>
                  <button @click="openGoogleCalendar(expandedMeeting)"
                    title="Abre un evento pre-relleno en Google Calendar"
                    class="flex items-center gap-1.5 text-xs font-mono text-zinc-400 hover:text-zinc-100 border border-zinc-800 hover:border-zinc-600 bg-zinc-900/60 px-2.5 py-1 rounded transition-all">
                    <svg class="w-3 h-3" viewBox="0 0 24 24" fill="currentColor"><path d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27 3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10 5.35 0 9.25-3.67 9.25-9.09 0-1.15-.15-1.81-.15-1.81z"/></svg>
                    Google Cal
                  </button>
                  <button @click="copyJira(expandedMeeting)"
                    title="Copia el resumen y action items en formato Jira wiki markup"
                    class="flex items-center gap-1.5 text-xs font-mono text-zinc-400 hover:text-zinc-100 border border-zinc-800 hover:border-zinc-600 bg-zinc-900/60 px-2.5 py-1 rounded transition-all">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
                    Jira
                  </button>
                  <button @click="exportCSV(expandedMeeting)"
                    title="Descarga los action items como CSV"
                    class="flex items-center gap-1.5 text-xs font-mono text-zinc-400 hover:text-zinc-100 border border-zinc-800 hover:border-zinc-600 bg-zinc-900/60 px-2.5 py-1 rounded transition-all">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    CSV
                  </button>
                </div>

                <!-- Report -->
                <div x-show="expandedMeeting?.report_md">
                  <details>
                    <summary class="text-xs text-zinc-500 font-mono uppercase tracking-wider cursor-pointer hover:text-zinc-300 transition-colors select-none list-none">
                      Report .md ›
                    </summary>
                    <pre class="mt-3 text-xs text-zinc-400 font-mono leading-relaxed bg-zinc-950/60 rounded-lg p-4 overflow-x-auto whitespace-pre-wrap border border-zinc-800/60"
                      x-text="expandedMeeting?.report_md"></pre>
                  </details>
                </div>

              </div>
            </div>

          </div>
        </template>
      </div>
    </div>

    <!-- ─────────────────────────────────────────────
         TAB: SEARCH
    ───────────────────────────────────────────── -->
    <div x-show="tab === 'search'" x-transition:enter="transition ease-out duration-150"
      x-transition:enter-start="opacity-0 translate-y-1" x-transition:enter-end="opacity-100 translate-y-0">
      <div class="max-w-2xl mx-auto">

        <!-- Input -->
        <div class="flex gap-3 mb-6">
          <input x-model="searchQuery" @keydown.enter="search()" type="text"
            placeholder="¿En qué reunión se habló sobre el deadline de Q2?"
            class="flex-1 bg-zinc-900 border border-zinc-800 rounded-lg px-4 py-2.5 text-sm text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-violet-500 transition-colors font-mono">
          <button @click="search()"
            :disabled="!searchQuery.trim() || searching"
            class="bg-violet-500 hover:bg-violet-600 disabled:opacity-40 text-white px-5 py-2.5 rounded-lg text-sm font-medium transition-colors whitespace-nowrap">
            <span x-show="!searching">Buscar</span>
            <span x-show="searching">…</span>
          </button>
        </div>

        <!-- No results -->
        <div x-show="searched && searchResults.length === 0"
          class="text-center py-10 text-zinc-600 text-sm font-mono">
          Sin resultados para "<span x-text="searchQuery" class="text-zinc-500"></span>"
        </div>

        <!-- Results -->
        <div class="space-y-3">
          <template x-for="(r, i) in searchResults" :key="i">
            <div class="rounded-lg border border-zinc-800 bg-zinc-900/40 p-4 hover:border-zinc-700 transition-colors">
              <p class="text-sm text-zinc-200 leading-relaxed mb-3" x-text="r.text"></p>
              <div class="flex items-center gap-2 flex-wrap text-xs font-mono">
                <span class="text-violet-400/80 bg-violet-950/30 px-2 py-0.5 rounded" x-text="r.meeting_title"></span>
                <span class="text-zinc-600" x-text="r.date"></span>
                <span class="text-zinc-600" x-show="r.speaker" x-text="'· ' + r.speaker"></span>
                <span class="text-zinc-700 ml-auto"
                  x-text="'[' + Math.floor(r.start / 60) + ':' + String(Math.floor(r.start % 60)).padStart(2, '0') + ']'"></span>
              </div>
            </div>
          </template>
        </div>

      </div>
    </div>

  </main>

  <!-- ── TOAST ── -->
  <div x-show="toast" x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150" x-transition:leave-end="opacity-0 translate-y-2"
    class="fixed bottom-5 right-5 z-50 bg-zinc-800 border border-zinc-700 text-zinc-100 text-xs font-mono px-4 py-2.5 rounded-lg shadow-xl flex items-center gap-2">
    <span class="text-emerald-400">✓</span>
    <span x-text="toast"></span>
  </div>

  <!-- ── FOOTER ── -->
  <footer class="border-t border-zinc-800/60 mt-16 py-5 text-center">
    <p class="text-xs text-zinc-700 font-mono">
      MeetingAgent · 100% local ·
      <a href="/docs" class="text-violet-400/50 hover:text-violet-400 transition-colors">API docs</a> ·
      <a href="https://github.com/Izanvz/MeetingAgent" target="_blank" class="text-violet-400/50 hover:text-violet-400 transition-colors">GitHub</a>
    </p>
  </footer>

  <script>
    function app() {
      return {
        tab: 'upload',
        apiOk: false,

        // Upload
        dragging: false,
        uploadFile: null,
        uploadTitle: '',
        uploadDate: new Date().toISOString().split('T')[0],
        uploading: false,
        job: null,
        pollingInterval: null,
        pipelineHint: 0,
        pipelineSteps: [
          '[node:transcribe]  Whisper transcribe audio local',
          '[node:summarize]   LLM extrae resumen y decisiones',
          '[node:actions]     LLM extrae action items',
          '[node:persist]     SQLite + ChromaDB indexado',
        ],

        // Meetings
        meetings: [],
        loadingMeetings: false,
        expandedMeeting: null,
        loadingDetail: false,

        // Search
        searchQuery: '',
        searchResults: [],
        searching: false,
        searched: false,

        // Toast
        toast: null,
        toastTimer: null,

        async init() {
          await this.checkApi();
          await this.loadMeetings();
        },

        async checkApi() {
          try {
            const r = await fetch('/meetings');
            this.apiOk = r.ok;
          } catch {
            this.apiOk = false;
          }
        },

        onDrop(e) {
          this.dragging = false;
          const file = e.dataTransfer.files[0];
          if (file) this.setFile(file);
        },

        onFileSelect(e) {
          const file = e.target.files[0];
          if (file) this.setFile(file);
        },

        setFile(file) {
          this.uploadFile = file;
          this.job = null;
          if (!this.uploadTitle) {
            this.uploadTitle = file.name.replace(/\.[^/.]+$/, '');
          }
        },

        async uploadAudio() {
          if (!this.uploadFile || this.uploading) return;
          this.uploading = true;
          this.job = null;
          this.pipelineHint = 0;
          clearInterval(this.pollingInterval);

          try {
            const fd = new FormData();
            fd.append('file', this.uploadFile);
            fd.append('title', this.uploadTitle || this.uploadFile.name.replace(/\.[^/.]+$/, ''));
            fd.append('meeting_date', this.uploadDate);

            const r = await fetch('/meetings/audio', { method: 'POST', body: fd });
            if (!r.ok) {
              const err = await r.json().catch(() => ({ detail: r.statusText }));
              throw new Error(err.detail ?? r.statusText);
            }
            this.job = await r.json();
            this.startPolling();
          } catch (err) {
            this.job = { status: 'error', error: err.message };
          } finally {
            this.uploading = false;
          }
        },

        startPolling() {
          let tick = 0;
          this.pollingInterval = setInterval(async () => {
            // Animate pipeline steps hint (~every 20s / 4 steps)
            tick++;
            this.pipelineHint = Math.min(Math.floor(tick / 5), 3);

            try {
              const r = await fetch(`/jobs/${this.job.job_id}`);
              this.job = await r.json();
              if (this.job.status === 'done' || this.job.status === 'error') {
                clearInterval(this.pollingInterval);
                if (this.job.status === 'done') await this.loadMeetings();
              }
            } catch {
              clearInterval(this.pollingInterval);
            }
          }, 2000);
        },

        async loadMeetings() {
          this.loadingMeetings = true;
          try {
            const r = await fetch('/meetings');
            const data = await r.json();
            this.meetings = [...data].reverse(); // newest first
          } catch {
            this.meetings = [];
          } finally {
            this.loadingMeetings = false;
          }
        },

        async toggleMeeting(id) {
          if (this.expandedMeeting?.id === id) {
            this.expandedMeeting = null;
            return;
          }
          this.loadingDetail = true;
          this.expandedMeeting = { id };
          try {
            const r = await fetch(`/meetings/${id}`);
            this.expandedMeeting = await r.json();
          } catch {
            this.expandedMeeting = null;
          } finally {
            this.loadingDetail = false;
          }
        },

        async toggleTask(item) {
          const newStatus = item.status === 'done' ? 'pending' : 'done';
          item.status = newStatus; // optimistic
          try {
            await fetch(`/tasks/${item.id}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ status: newStatus }),
            });
          } catch {
            item.status = newStatus === 'done' ? 'pending' : 'done'; // rollback
          }
        },

        // ── Helpers ──────────────────────────────────────────
        showToast(msg) {
          this.toast = msg;
          clearTimeout(this.toastTimer);
          this.toastTimer = setTimeout(() => this.toast = null, 2500);
        },

        downloadFile(content, filename, type) {
          const blob = new Blob([content], { type });
          const url  = URL.createObjectURL(blob);
          const a    = Object.assign(document.createElement('a'), { href: url, download: filename });
          a.click();
          URL.revokeObjectURL(url);
        },

        // ── Exportaciones ────────────────────────────────────

        /** ICS: reunión + un VEVENT por action item con fecha límite */
        exportICS(meeting) {
          const pad  = s => String(s).padStart(2, '0');
          const ymd  = d => d ? d.replace(/-/g, '') : new Date().toISOString().slice(0,10).replace(/-/g,'');
          const esc  = s => (s ?? '').replace(/[\\;,]/g, m => '\\' + m).replace(/\n/g, '\\n');
          const uid  = suffix => `${suffix}-${meeting.id}@meetingagent`;

          const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//MeetingAgent//ES','CALSCALE:GREGORIAN','METHOD:PUBLISH'];

          // Evento principal: la reunión
          const meetDate = ymd(meeting.date);
          lines.push('BEGIN:VEVENT',
            `UID:${uid('meeting')}`,
            `DTSTART;VALUE=DATE:${meetDate}`,
            `DTEND;VALUE=DATE:${meetDate}`,
            `SUMMARY:📋 ${esc(meeting.title)}`,
            `DESCRIPTION:${esc(meeting.summary ?? '')}\\n\\nDecisiones:\\n${(meeting.decisions ?? []).map(d => '• ' + d).join('\\n')}`,
            'END:VEVENT'
          );

          // Un evento por cada action item
          for (const item of meeting.action_items ?? []) {
            const due = ymd(item.due_date || meeting.date);
            lines.push('BEGIN:VEVENT',
              `UID:${uid('task-' + item.id)}`,
              `DTSTART;VALUE=DATE:${due}`,
              `DTEND;VALUE=DATE:${due}`,
              `SUMMARY:✅ ${esc(item.task)}`,
              `DESCRIPTION:Responsable: ${esc(item.owner ?? '—')}\\nReunión: ${esc(meeting.title)}`,
              item.status === 'done' ? 'STATUS:COMPLETED' : 'STATUS:NEEDS-ACTION',
              'END:VEVENT'
            );
          }
          lines.push('END:VCALENDAR');
          this.downloadFile(lines.join('\r\n'), `${meeting.title}.ics`, 'text/calendar');
          this.showToast('ICS descargado');
        },

        /** Google Calendar: abre formulario pre-relleno en nueva pestaña */
        openGoogleCalendar(meeting) {
          const date    = (meeting.date ?? new Date().toISOString().slice(0,10)).replace(/-/g,'');
          const details = [
            meeting.summary ?? '',
            '',
            'Action Items:',
            ...(meeting.action_items ?? []).map(i => `• ${i.task}${i.owner ? ' (' + i.owner + ')' : ''}${i.due_date ? ' — ' + i.due_date : ''}`),
          ].join('\n');

          const url = new URL('https://calendar.google.com/calendar/render');
          url.searchParams.set('action',  'TEMPLATE');
          url.searchParams.set('text',    `Reunión: ${meeting.title}`);
          url.searchParams.set('dates',   `${date}T090000/${date}T100000`);
          url.searchParams.set('details', details);
          window.open(url.toString(), '_blank', 'noopener');
        },

        /** Jira: copia wiki markup al portapapeles */
        copyJira(meeting) {
          const lines = [
            `h2. ${meeting.title}`,
            `*Fecha:* ${meeting.date ?? '—'}`,
            `*Resumen:* ${meeting.summary ?? '—'}`,
            '',
          ];
          if (meeting.decisions?.length) {
            lines.push('h3. Decisiones', ...(meeting.decisions.map(d => `* ${d}`)), '');
          }
          if (meeting.action_items?.length) {
            lines.push('h3. Action Items');
            lines.push('||Tarea||Responsable||Fecha límite||Estado||');
            for (const i of meeting.action_items)
              lines.push(`|${i.task}|${i.owner ?? '—'}|${i.due_date ?? '—'}|${i.status}|`);
          }
          navigator.clipboard.writeText(lines.join('\n'))
            .then(() => this.showToast('Copiado para Jira'))
            .catch(() => this.showToast('Error al copiar'));
        },

        /** CSV: descarga action items */
        exportCSV(meeting) {
          const q  = s => `"${(s ?? '').replace(/"/g, '""')}"`;
          const rows = [
            ['Tarea','Responsable','Fecha límite','Estado','Reunión','Fecha reunión'].join(','),
            ...(meeting.action_items ?? []).map(i =>
              [q(i.task), q(i.owner), i.due_date ?? '', i.status, q(meeting.title), meeting.date ?? ''].join(',')
            ),
          ];
          this.downloadFile(rows.join('\n'), `${meeting.title}-tasks.csv`, 'text/csv;charset=utf-8;');
          this.showToast('CSV descargado');
        },

        async search() {
          if (!this.searchQuery.trim() || this.searching) return;
          this.searching = true;
          this.searched = false;
          try {
            const r = await fetch('/search', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ query: this.searchQuery, top_k: 8 }),
            });
            const data = await r.json();
            this.searchResults = data.results ?? [];
            this.searched = true;
          } catch {
            this.searchResults = [];
          } finally {
            this.searching = false;
          }
        },
      };
    }
  </script>

</body>
</html>

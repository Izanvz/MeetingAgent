<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeetingAgent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css?v=20260331b">
</head>
<body>
  <div class="app-bg"></div>
  <div class="app-grid"></div>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <a href="/" data-link class="brand-mark" aria-label="Ir a inicio">
          <span class="brand-play"></span>
        </a>
        <div class="brand-copy">
          <a href="/" data-link class="brand-name">MeetingAgent</a>
          <span class="brand-tag">Local runtime</span>
        </div>
      </div>
      <nav class="nav" aria-label="Principal">
        <a href="/" data-link data-page="home">Home</a>
        <a href="/app/upload" data-link data-page="upload">Nueva reunión</a>
        <a href="/app/meetings" data-link data-page="meetings">Reuniones</a>
        <a href="/app/search" data-link data-page="search">Búsqueda</a>
        <a href="/app/setup" data-link data-page="setup">Setup</a>
      </nav>
      <div class="topbar-meta">
        <div id="runtime-pill" class="runtime-pill">
          <span class="runtime-dot"></span>
          <span>Comprobando runtime</span>
        </div>
        <button class="ghost-button" type="button" disabled aria-disabled="true">Login</button>
      </div>
    </header>

    <main class="page-shell">
      <div id="app"></div>
    </main>
  </div>

  <div id="toast" class="toast" hidden></div>
  <script src="/static/app.js?v=20260331b" defer></script>
</body>
</html>
